  name:  "🛠️ Build & Test"

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  permissions:
    contents: read

  jobs:
    test:
      name: "🧪 Build & Test"
      runs-on: ubuntu-latest

      steps:
        - name: "📥 Checkout"
          uses: actions/checkout@v5

        - name: "✨ Setup Go"
          uses: actions/setup-go@v5
          with:
            go-version: "1.24"
            cache: true

        - name: "📦 Verify Modules"
          run: |
            go mod tidy
            git diff --exit-code

        - name: "🎨 Check Formatting"
          run: |
            unformatted="$(gofmt -l .)"
            if [ -n "$unformatted" ]; then
              echo "These files need gofmt:"
              echo "$unformatted"
              exit 1
            fi

        - name: "📝 Linting"
          run: go vet ./...

        - name: "🔨 Build"
          run: go build ./...

        - name: "🔍 Run Tests"
          run: go test -race -coverprofile=coverage.out ./...

        - name: "📊 Coverage Summary"
          run: go tool cover -func=coverage.out

        - name: "📤 Upload Coverage"
          uses: actions/upload-artifact@v4
          with:
            name: coverage
            path: coverage.out
